<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .item { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .item form { display: inline; }
        .edit-form { display: none; }
        .edit-mode .display { display: none; }
        .edit-mode .edit-form { display: block; }
        form { margin: 20px 0; }
        input, button { margin: 5px; padding: 5px; }
        /* Chat styles */
        #chat-container { border: 1px solid #ddd; padding: 10px; margin-top: 20px; max-width: 700px; }
        #chat-messages { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background:#fafafa }
        .msg { padding: 8px; margin: 6px 0; border-radius: 6px; max-width: 80%; }
        .msg.user { background: #d1e7ff; align-self: flex-end; margin-left: auto; }
        .msg.assistant { background: #f1f1f1; }
        #chat-form { display:flex; gap:8px; margin-top:8px }
        #chat-input { flex:1 }
    </style>
</head>
<body>
    <h1>Items Manager</h1>

    <h2>Iris Classifier</h2>
    <form id="predict-form">
        <input type="number" step="any" id="f1" placeholder="Sepal length (e.g. 5.1)" required>
        <input type="number" step="any" id="f2" placeholder="Sepal width (e.g. 3.5)" required>
        <input type="number" step="any" id="f3" placeholder="Petal length (e.g. 1.4)" required>
        <input type="number" step="any" id="f4" placeholder="Petal width (e.g. 0.2)" required>
        <button type="submit">Predict</button>
    </form>
    <div id="predict-result"></div>

    <h2>Create New Item</h2>
    <form id="create-form">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="description" placeholder="Description">
        <button type="submit">Create Item</button>
    </form>

    <h2>Items List</h2>
    <div id="items-list"></div>

    <h2>Agent Workspace</h2>
    <div id="agent-container" style="border: 1px solid #ddd; padding: 10px; max-width: 700px;">
        <form id="agent-form" style="display:flex; gap:8px; margin-bottom: 10px;">
            <input id="agent-input" type="text" placeholder="Enter a task for the agent..." style="flex:1" required />
            <button id="agent-send" type="submit">Run Agent</button>
            <span id="agent-loading" style="display:none; align-self:center">⏳ Working...</span>
        </form>
        <div id="agent-result" style="border: 1px solid #cce5ff; background: #e9f7ff; padding: 10px; margin-bottom: 10px; display:none;"></div>
        <div id="agent-approval" style="display:none; border: 1px solid #f5c2c7; background: #fff1f0; padding: 10px; margin-bottom: 10px;">
            <div id="pending-tool-text"></div>
            <button id="approve-tool">Approve</button>
            <button id="cancel-tool" type="button">Cancel</button>
        </div>
        <div id="trace-container" style="display:none;">
            <h3>Reasoning trace</h3>
            <pre id="trace-output" style="white-space: pre-wrap; background: #f7f7f7; padding: 10px; border: 1px solid #ddd;"></pre>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function loadItems() {
            const response = await fetch(`${API_BASE}/items`);
            const items = await response.json();
            renderItems(items);
        }

        function renderItems(items) {
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="display">
                        <strong>${item.name}</strong>: ${item.description || 'No description'}
                        <button onclick="editItem(${item.id})">Edit</button>
                        <button onclick="deleteItem(${item.id})">Delete</button>
                    </div>
                    <form class="edit-form" onsubmit="saveEdit(event, ${item.id})">
                        <input type="text" value="${item.name}" required>
                        <input type="text" value="${item.description || ''}" placeholder="Description">
                        <button type="submit">Save</button>
                        <button type="button" onclick="cancelEdit(${item.id})">Cancel</button>
                    </form>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;
            await fetch(`${API_BASE}/items`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description })
            });
            document.getElementById('create-form').reset();
            loadItems();
        });

        async function deleteItem(id) {
            await fetch(`${API_BASE}/items/${id}`, { method: 'DELETE' });
            loadItems();
        }

        function editItem(id) {
            const itemDiv = document.querySelector(`.item:has(button[onclick="editItem(${id})"])`);
            itemDiv.classList.add('edit-mode');
        }

        function cancelEdit(id) {
            const itemDiv = document.querySelector(`.item:has(button[onclick="editItem(${id})"])`);
            itemDiv.classList.remove('edit-mode');
        }

        async function saveEdit(e, id) {
            e.preventDefault();
            const form = e.target;
            const name = form.querySelector('input[type="text"]:nth-child(1)').value;
            const description = form.querySelector('input[type="text"]:nth-child(2)').value;
            await fetch(`${API_BASE}/items/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description })
            });
            loadItems();
        }

        document.getElementById('predict-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('predict-result');
            try {
                const features = ['f1','f2','f3','f4'].map(id => parseFloat(document.getElementById(id).value));
                const response = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ features })
                });
                const result = await response.json();
                const pct = (result.confidence * 100).toFixed(1);
                resultDiv.innerHTML =
                    `<strong>Prediction:</strong> ${result.prediction} &nbsp;|&nbsp; <strong>Confidence:</strong> ${pct}%`;
            } catch (err) {
                resultDiv.innerHTML = `<span style="color:red">Error: ${err.message} — is the server running at ${API_BASE}?</span>`;
            }
        });

        // Load items on page load
        loadItems();

        // --- Agent logic ---
        const agentForm = document.getElementById('agent-form');
        const agentInput = document.getElementById('agent-input');
        const agentLoading = document.getElementById('agent-loading');
        const agentResult = document.getElementById('agent-result');
        const agentApproval = document.getElementById('agent-approval');
        const pendingToolText = document.getElementById('pending-tool-text');
        const approveTool = document.getElementById('approve-tool');
        const cancelTool = document.getElementById('cancel-tool');
        const traceContainer = document.getElementById('trace-container');
        const traceOutput = document.getElementById('trace-output');
        let conversation_history = [];
        let currentTask = null;
        let currentSteps = [];
        let currentPendingTool = null;

        function setAgentResult(text) {
            if (!text) {
                agentResult.style.display = 'none';
                agentResult.textContent = '';
                return;
            }
            agentResult.style.display = 'block';
            agentResult.textContent = text;
        }

        function renderTrace(steps) {
            if (steps && steps.length) {
                traceContainer.style.display = 'block';
                traceOutput.textContent = JSON.stringify(steps, null, 2);
            } else {
                traceContainer.style.display = 'none';
                traceOutput.textContent = '';
            }
        }

        function showApproval(pending) {
            currentPendingTool = pending;
            pendingToolText.textContent = `The agent requests ${pending.name} with arguments ${JSON.stringify(pending.args)}. ${pending.description}`;
            agentApproval.style.display = 'block';
        }

        function hideApproval() {
            currentPendingTool = null;
            agentApproval.style.display = 'none';
            pendingToolText.textContent = '';
        }

        async function callAgent(payload, endpoint = '/agent') {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(err || 'Agent call failed');
            }
            return await res.json();
        }

        async function handleAgentResponse(data) {
            currentSteps = data.steps || currentSteps;
            conversation_history = data.conversation_history || conversation_history;
            renderTrace(currentSteps);

            if (data.status === 'needs_confirmation') {
                setAgentResult('Awaiting your approval for a destructive tool call.');
                showApproval(data.pending_tool);
                return;
            }

            hideApproval();
            if (data.result) {
                setAgentResult(data.result);
            } else if (data.message) {
                setAgentResult(data.message);
            } else {
                setAgentResult('Agent completed with no final result.');
            }
        }

        agentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const task = agentInput.value.trim();
            if (!task) return;
            currentTask = task;
            currentSteps = [];
            hideApproval();
            setAgentResult('');
            agentLoading.style.display = 'inline';

            try {
                const data = await callAgent({ task, conversation_history });
                await handleAgentResponse(data);
            } catch (err) {
                setAgentResult('Error: ' + err.message);
            } finally {
                agentLoading.style.display = 'none';
            }
        });

        approveTool.addEventListener('click', async () => {
            if (!currentTask || !currentPendingTool) return;
            agentLoading.style.display = 'inline';
            agentApproval.style.display = 'none';
            try {
                const data = await callAgent({
                    task: currentTask,
                    conversation_history,
                    pending_tool: currentPendingTool,
                    steps: currentSteps,
                    approved: true
                }, '/agent/confirm');
                await handleAgentResponse(data);
            } catch (err) {
                setAgentResult('Error: ' + err.message);
            } finally {
                agentLoading.style.display = 'none';
            }
        });

        cancelTool.addEventListener('click', async () => {
            if (!currentTask || !currentPendingTool) return;
            agentLoading.style.display = 'inline';
            agentApproval.style.display = 'none';
            try {
                const data = await callAgent({
                    task: currentTask,
                    conversation_history,
                    pending_tool: currentPendingTool,
                    steps: currentSteps,
                    approved: false
                }, '/agent/confirm');
                await handleAgentResponse(data);
            } catch (err) {
                setAgentResult('Error: ' + err.message);
            } finally {
                agentLoading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
