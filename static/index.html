<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .item { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .item form { display: inline; }
        .edit-form { display: none; }
        .edit-mode .display { display: none; }
        .edit-mode .edit-form { display: block; }
        form { margin: 20px 0; }
        input, button { margin: 5px; padding: 5px; }
        /* Chat styles */
        #chat-container { border: 1px solid #ddd; padding: 10px; margin-top: 20px; max-width: 700px; }
        #chat-messages { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background:#fafafa }
        .msg { padding: 8px; margin: 6px 0; border-radius: 6px; max-width: 80%; }
        .msg.user { background: #d1e7ff; align-self: flex-end; margin-left: auto; }
        .msg.assistant { background: #f1f1f1; }
        #chat-form { display:flex; gap:8px; margin-top:8px }
        #chat-input { flex:1 }
    </style>
</head>
<body>
    <h1>Items Manager</h1>

    <h2>Iris Classifier</h2>
    <form id="predict-form">
        <input type="number" step="any" id="f1" placeholder="Sepal length (e.g. 5.1)" required>
        <input type="number" step="any" id="f2" placeholder="Sepal width (e.g. 3.5)" required>
        <input type="number" step="any" id="f3" placeholder="Petal length (e.g. 1.4)" required>
        <input type="number" step="any" id="f4" placeholder="Petal width (e.g. 0.2)" required>
        <button type="submit">Predict</button>
    </form>
    <div id="predict-result"></div>

    <h2>Create New Item</h2>
    <form id="create-form">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="description" placeholder="Description">
        <button type="submit">Create Item</button>
    </form>

    <h2>Items List</h2>
    <div id="items-list"></div>

    <h2>Chat with Assistant</h2>
    <div id="chat-container">
        <div id="chat-messages" aria-live="polite"></div>
        <form id="chat-form">
            <input id="chat-input" type="text" placeholder="Ask about items or usage..." required />
            <button id="chat-send" type="submit">Send</button>
            <span id="chat-loading" style="display:none">⏳</span>
        </form>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function loadItems() {
            const response = await fetch(`${API_BASE}/items`);
            const items = await response.json();
            renderItems(items);
        }

        function renderItems(items) {
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="display">
                        <strong>${item.name}</strong>: ${item.description || 'No description'}
                        <button onclick="editItem(${item.id})">Edit</button>
                        <button onclick="deleteItem(${item.id})">Delete</button>
                    </div>
                    <form class="edit-form" onsubmit="saveEdit(event, ${item.id})">
                        <input type="text" value="${item.name}" required>
                        <input type="text" value="${item.description || ''}" placeholder="Description">
                        <button type="submit">Save</button>
                        <button type="button" onclick="cancelEdit(${item.id})">Cancel</button>
                    </form>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;
            await fetch(`${API_BASE}/items`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description })
            });
            document.getElementById('create-form').reset();
            loadItems();
        });

        async function deleteItem(id) {
            await fetch(`${API_BASE}/items/${id}`, { method: 'DELETE' });
            loadItems();
        }

        function editItem(id) {
            const itemDiv = document.querySelector(`.item:has(button[onclick="editItem(${id})"])`);
            itemDiv.classList.add('edit-mode');
        }

        function cancelEdit(id) {
            const itemDiv = document.querySelector(`.item:has(button[onclick="editItem(${id})"])`);
            itemDiv.classList.remove('edit-mode');
        }

        async function saveEdit(e, id) {
            e.preventDefault();
            const form = e.target;
            const name = form.querySelector('input[type="text"]:nth-child(1)').value;
            const description = form.querySelector('input[type="text"]:nth-child(2)').value;
            await fetch(`${API_BASE}/items/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description })
            });
            loadItems();
        }

        document.getElementById('predict-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('predict-result');
            try {
                const features = ['f1','f2','f3','f4'].map(id => parseFloat(document.getElementById(id).value));
                const response = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ features })
                });
                const result = await response.json();
                const pct = (result.confidence * 100).toFixed(1);
                resultDiv.innerHTML =
                    `<strong>Prediction:</strong> ${result.prediction} &nbsp;|&nbsp; <strong>Confidence:</strong> ${pct}%`;
            } catch (err) {
                resultDiv.innerHTML = `<span style="color:red">Error: ${err.message} — is the server running at ${API_BASE}?</span>`;
            }
        });

        // Load items on page load
        loadItems();

        // --- Chat logic ---
        const chatMessages = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatLoading = document.getElementById('chat-loading');
        let conversation_history = [];

        function appendChatMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + (role === 'user' ? 'user' : 'assistant');
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;
            appendChatMessage('user', message);
            chatInput.value = '';
            chatLoading.style.display = 'inline';

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, conversation_history })
                });

                if (!res.ok) {
                    const err = await res.text();
                    appendChatMessage('assistant', 'Error: ' + err);
                } else {
                    const data = await res.json();
                    appendChatMessage('assistant', data.reply);
                    conversation_history = data.conversation_history || conversation_history;
                }

            } catch (err) {
                appendChatMessage('assistant', 'Network error: ' + err.message);
            } finally {
                chatLoading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
