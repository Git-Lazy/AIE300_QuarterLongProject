<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .item { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .item form { display: inline; }
        .edit-form { display: none; }
        .edit-mode .display { display: none; }
        .edit-mode .edit-form { display: block; }
        form { margin: 20px 0; }
        input, button { margin: 5px; padding: 5px; }
    </style>
</head>
<body>
    <h1>Items Manager</h1>

    <h2>Create New Item</h2>
    <form id="create-form">
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="description" placeholder="Description">
        <button type="submit">Create Item</button>
    </form>

    <h2>Items List</h2>
    <div id="items-list"></div>

    <script>
        const API_BASE = window.location.origin;

        async function loadItems() {
            const response = await fetch(`${API_BASE}/items`);
            const items = await response.json();
            renderItems(items);
        }

        function renderItems(items) {
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="display">
                        <strong>${item.name}</strong>: ${item.description || 'No description'}
                        <button onclick="editItem(${item.id})">Edit</button>
                        <button onclick="deleteItem(${item.id})">Delete</button>
                    </div>
                    <form class="edit-form" onsubmit="saveEdit(event, ${item.id})">
                        <input type="text" value="${item.name}" required>
                        <input type="text" value="${item.description || ''}" placeholder="Description">
                        <button type="submit">Save</button>
                        <button type="button" onclick="cancelEdit(${item.id})">Cancel</button>
                    </form>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;
            await fetch(`${API_BASE}/items`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description })
            });
            document.getElementById('create-form').reset();
            loadItems();
        });

        async function deleteItem(id) {
            await fetch(`${API_BASE}/items/${id}`, { method: 'DELETE' });
            loadItems();
        }

        function editItem(id) {
            const itemDiv = document.querySelector(`.item:has(button[onclick="editItem(${id})"])`);
            itemDiv.classList.add('edit-mode');
        }

        function cancelEdit(id) {
            const itemDiv = document.querySelector(`.item:has(button[onclick="editItem(${id})"])`);
            itemDiv.classList.remove('edit-mode');
        }

        async function saveEdit(e, id) {
            e.preventDefault();
            const form = e.target;
            const name = form.querySelector('input[type="text"]:nth-child(1)').value;
            const description = form.querySelector('input[type="text"]:nth-child(2)').value;
            await fetch(`${API_BASE}/items/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description })
            });
            loadItems();
        }

        // Load items on page load
        loadItems();
    </script>
</body>
</html>
